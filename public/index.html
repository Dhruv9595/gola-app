<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>🍧 Ice Gola Order</h2>

<form id="form">
<input id="name" placeholder="Your Name" required><br><br>

<select id="flavor"></select><br><br>

<input id="qty" type="number" value="1"><br><br>

<button>Order</button>
</form>

<script>
async function loadMenu() {
  const res = await fetch("/menu");
  const data = await res.json();

  const select = document.getElementById("flavor");

  data.forEach(item => {
    const opt = document.createElement("option");
    opt.value = item.name;
    opt.text = `${item.name} - ₹${item.price}`;
    select.appendChild(opt);
  });
}

document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  await fetch("/order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value,
      flavor: document.getElementById("flavor").value,
      quantity: document.getElementById("qty").value
    })
  });

  alert("Order Sent!");
};

loadMenu();
</script>

</body>
</html>
